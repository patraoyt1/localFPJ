<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro Seguro</title>

    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Bibliotecas: Tailwind CSS, FontAwesome e Alpine.js -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        [x-cloak] { display: none !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #4b5563; border-radius: 4px; }
    </style>
</head>
<body class="flex justify-center min-h-screen p-4">

    <div x-data="app()" x-init="iniciar()" x-cloak class="w-full max-w-md space-y-4 pb-10">

        <!-- Modais do Sistema (Alertas, Confirmação, Prompts) -->
        <div x-show="modal.show" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
            <div class="bg-gray-800 p-6 rounded-xl shadow-2xl w-full max-w-sm border border-blue-500/30">
                <h3 class="text-lg font-bold mb-3 text-blue-400" x-text="modal.title"></h3>
                <p class="text-sm text-gray-300 mb-4" x-html="modal.body"></p>
                
                <template x-if="modal.type === 'prompt'">
                    <input type="text" x-model="modal.inputValue" class="w-full bg-gray-900 text-white p-3 rounded-lg mb-4 border border-gray-700 outline-none text-center" autofocus>
                </template>

                <div class="flex justify-end gap-3">
                    <template x-if="modal.type !== 'alert'">
                        <button @click="modal.reject()" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg text-sm transition">Cancelar</button>
                    </template>
                    <button @click="modal.resolve()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold px-4 py-2 rounded-lg text-sm transition">
                        <span x-text="modal.confirmText"></span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Tela de Login e Gerenciamento de Usuários -->
        <div x-show="!isLoggedIn" class="bg-gray-900 p-8 rounded-2xl shadow-2xl border border-blue-700/50 flex flex-col justify-center items-center mt-10">
            <i class="fa-solid fa-wallet text-blue-500 text-5xl mb-6"></i>
            <h1 class="text-xl font-bold mb-6 text-white">Acesso Financeiro</h1>

            <div x-show="usuariosSalvos.length > 0 && !criandoNovo" class="w-full space-y-3 mb-6">
                <p class="text-xs text-gray-400 text-center uppercase tracking-widest">Selecionar Conta</p>
                <template x-for="user in usuariosSalvos" :key="user.nome">
                    <div class="flex items-center gap-2">
                        <button @click="selecionarUsuario(user)" class="flex-1 bg-gray-800 hover:bg-gray-700 text-left p-4 rounded-lg transition border border-gray-700 flex justify-between items-center">
                            <span class="font-bold text-blue-300" x-text="user.nome"></span>
                        </button>
                        <button @click="excluirUsuario(user.nome)" class="bg-red-900/30 text-red-400 p-4 rounded-lg hover:bg-red-600 hover:text-white transition">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </template>
                <button @click="criandoNovo = true" class="w-full mt-4 bg-transparent border border-blue-600 text-blue-400 font-bold py-2 rounded-lg hover:bg-blue-600 hover:text-white transition">
                    + Criar Novo Login
                </button>
            </div>

            <div x-show="criandoNovo || usuariosSalvos.length === 0" class="w-full">
                <input x-model="novoNome" type="text" placeholder="Nome de Usuário" class="w-full bg-gray-800 text-white p-3 rounded-lg mb-3 border border-gray-700 focus:border-blue-500 outline-none">
                <input x-model="novaSenha" type="password" placeholder="Crie uma Senha" class="w-full bg-gray-800 text-white p-3 rounded-lg mb-4 border border-gray-700 focus:border-blue-500 outline-none">
                
                <div class="flex gap-2">
                    <button @click="criarPerfil()" class="flex-1 bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-lg transition">Cadastrar</button>
                    <button x-show="usuariosSalvos.length > 0" @click="criandoNovo = false" class="bg-gray-700 text-white px-4 rounded-lg hover:bg-gray-600">Voltar</button>
                </div>
            </div>

            <div x-show="usuarioSelecionado" class="w-full mt-4 border-t border-gray-700 pt-6">
                <p class="text-sm text-center text-gray-400 mb-4">Entrando como: <strong class="text-white" x-text="usuarioSelecionado?.nome"></strong></p>
                
                <div class="mb-4">
                    <input x-model="senhaTentativa" @keydown.enter="fazerLogin()" type="password" placeholder="Digite sua senha" class="w-full bg-gray-800 text-white p-3 rounded-lg mb-2 border border-gray-700 focus:border-blue-500 outline-none">
                    <button @click="fazerLogin()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition">Entrar</button>
                </div>
            </div>
            <p x-show="erroLogin" class="text-red-400 text-sm mt-4 text-center font-bold" x-text="erroLogin"></p>
        </div>

        <!-- Tela Principal do Sistema -->
        <div x-show="isLoggedIn" class="space-y-6">
            
            <!-- Cabeçalho e Saldo Atual -->
            <div class="bg-gray-900 p-6 rounded-2xl border border-gray-700 text-center relative shadow-lg">
                <p class="text-xs text-gray-400 uppercase tracking-widest font-bold mb-1">
                    Olá, <span x-text="perfilAtivo?.nome" class="text-blue-400"></span>
                </p>
                <div class="flex items-center justify-center gap-3">
                    <h2 class="text-4xl font-black text-white" x-text="formatarMoeda(saldoTotal)"></h2>
                    <button @click="editarSaldo()" class="text-gray-400 hover:text-white transition w-8 h-8 bg-gray-800 rounded-full border border-gray-600 flex items-center justify-center">
                        <i class="fa-solid fa-pencil text-xs"></i>
                    </button>
                </div>
                
                <button @click="logout()" class="absolute top-4 right-4 text-gray-500 hover:text-red-400 transition" title="Sair"><i class="fa-solid fa-power-off"></i></button>
            </div>

            <!-- Botões de Backup e Restauração -->
            <div class="flex gap-2">
                <button @click="exportarBackup()" class="flex-1 bg-gray-800 border border-gray-700 text-sm text-gray-300 p-3 rounded-lg hover:bg-blue-600 hover:text-white transition flex justify-center items-center gap-2 font-bold shadow-md">
                    <i class="fa-solid fa-download"></i> Fazer Backup
                </button>
                <label class="flex-1 bg-gray-800 border border-gray-700 text-sm text-gray-300 p-3 rounded-lg hover:bg-green-600 hover:text-white transition flex justify-center items-center gap-2 cursor-pointer font-bold shadow-md">
                    <i class="fa-solid fa-upload"></i> Restaurar
                    <input type="file" @change="importarBackup($event)" accept=".enc, .json" class="hidden">
                </label>
            </div>

            <!-- Menus Separados de Totais (Ano e Mês) -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 text-center">
                    <p class="text-[10px] text-gray-400 uppercase font-bold mb-2 border-b border-gray-700 pb-1">Total Ano (<span x-text="anoAtual"></span>)</p>
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-xs text-gray-500">Entrou:</span>
                        <span class="text-sm font-bold text-green-400" x-text="formatarMoeda(totaisAnuais.entradas)"></span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-gray-500">Saiu:</span>
                        <span class="text-sm font-bold text-red-400" x-text="formatarMoeda(totaisAnuais.saidas)"></span>
                    </div>
                </div>
                <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 text-center">
                    <p class="text-[10px] text-gray-400 uppercase font-bold mb-2 border-b border-gray-700 pb-1">Total Mês (<span x-text="nomeMesAtual"></span>)</p>
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-xs text-gray-500">Entrou:</span>
                        <span class="text-sm font-bold text-green-400" x-text="formatarMoeda(totaisMensais.entradas)"></span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-gray-500">Saiu:</span>
                        <span class="text-sm font-bold text-red-400" x-text="formatarMoeda(totaisMensais.saidas)"></span>
                    </div>
                </div>
            </div>

            <!-- Menu de Lançamentos -->
            <div class="bg-gray-800 p-5 rounded-xl shadow-lg border border-gray-700">
                <h3 class="text-xs text-gray-400 uppercase font-bold mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-pen-to-square"></i> Novo Lançamento
                </h3>
                
                <div class="flex gap-2 mb-4">
                    <button @click="formLancamento.tipo = 'entrada'" :class="formLancamento.tipo === 'entrada' ? 'bg-green-600 text-white' : 'bg-gray-700 text-gray-400 hover:bg-gray-600'" class="flex-1 py-2 rounded-lg text-sm font-bold transition">ENTRADA</button>
                    <button @click="formLancamento.tipo = 'saida'" :class="formLancamento.tipo === 'saida' ? 'bg-red-600 text-white' : 'bg-gray-700 text-gray-400 hover:bg-gray-600'" class="flex-1 py-2 rounded-lg text-sm font-bold transition">SAÍDA</button>
                </div>

                <div class="space-y-3">
                    <!-- ENVOLTÓRIO RELATIVO PARA O POPUP DE SUGESTÃO -->
                    <div class="relative w-full z-20">
                        <!-- Popup flutuante de sugestões (Aparece ACIMA do input) -->
                        <div x-show="mostrarSugestoes && sugestoesNomes.length > 0" 
                             @click.outside="mostrarSugestoes = false"
                             class="absolute bottom-full left-0 mb-1 w-full bg-gray-700 border border-gray-600 rounded-lg shadow-[0_-5px_15px_rgba(0,0,0,0.3)] overflow-hidden max-h-40 custom-scrollbar z-30">
                            <template x-for="sugestao in sugestoesNomes" :key="sugestao">
                                <button @click="selecionarSugestao(sugestao)" class="w-full text-left px-4 py-2.5 text-sm text-gray-200 hover:bg-blue-600 hover:text-white transition border-b border-gray-600 last:border-0" x-text="sugestao"></button>
                            </template>
                        </div>
                        
                        <!-- Input de Nome do Lançamento -->
                        <input x-model="formLancamento.nome" 
                               @input="mostrarSugestoes = true; sugerirValor()" 
                               @focus="mostrarSugestoes = true"
                               type="text" placeholder="Nome do lançamento (ex: Salário, Padaria)" 
                               class="w-full bg-gray-900 text-white p-3 rounded-lg border border-gray-600 outline-none focus:border-blue-500 text-sm relative z-20">
                    </div>
                    
                    <div class="flex gap-2 relative z-10">
                        <div class="relative w-full">
                            <span class="absolute left-3 top-3 text-gray-500 text-sm">R$</span>
                            <input x-model="formLancamento.valor" type="number" step="0.01" placeholder="0.00" class="w-full bg-gray-900 text-white p-3 pl-9 rounded-lg border border-gray-600 outline-none focus:border-blue-500 text-sm">
                        </div>
                        <button @click="salvarLancamento()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 rounded-lg font-bold transition">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Menu de Transações e Pesquisa -->
            <div class="bg-gray-900 rounded-xl border border-gray-700 p-4">
                <div class="flex justify-between items-center mb-4 border-b border-gray-800 pb-3">
                    <h3 class="text-sm text-white font-bold">Transações do Mês</h3>
                    <div class="flex items-center gap-2">
                        <button @click="mudarMes(-1)" class="text-gray-500 hover:text-white"><i class="fa-solid fa-chevron-left"></i></button>
                        <span class="text-xs text-blue-400 font-bold uppercase min-w-[80px] text-center" x-text="nomeMesAtual"></span>
                        <button @click="mudarMes(1)" class="text-gray-500 hover:text-white"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                </div>

                <!-- Barra de Pesquisa -->
                <div class="relative mb-4">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-500"></i>
                    <input x-model="termoPesquisa" type="text" placeholder="Pesquisar por nome..." class="w-full bg-gray-800 text-white p-2 pl-9 rounded-lg border border-gray-700 outline-none text-sm">
                    
                    <!-- DADOS REATIVOS DA PESQUISA -->
                    <div x-show="termoPesquisa.length > 0" class="flex flex-col sm:flex-row sm:justify-between items-start sm:items-center bg-gray-800/50 p-2 mt-2 rounded border border-gray-700">
                        <p class="text-[10px] text-blue-400 mb-1 sm:mb-0" x-text="transacoesListadas.length + ' registro(s) encontrado(s)'"></p>
                        <div class="flex gap-3 text-[10px]">
                            <span class="text-gray-400">In: <span class="text-green-400 font-bold" x-text="formatarMoeda(totaisPesquisa.entradas)"></span></span>
                            <span class="text-gray-400">Out: <span class="text-red-400 font-bold" x-text="formatarMoeda(totaisPesquisa.saidas)"></span></span>
                        </div>
                    </div>
                </div>

                <!-- Lista -->
                <div class="space-y-2 max-h-80 overflow-y-auto custom-scrollbar pr-1">
                    <template x-for="item in transacoesListadas" :key="item.id">
                        <div class="bg-gray-800 p-3 rounded-lg border border-gray-700 flex justify-between items-center hover:border-gray-500 transition">
                            <div class="flex items-center gap-3">
                                <div :class="item.tipo === 'entrada' ? 'text-green-400 bg-green-900/20' : 'text-red-400 bg-red-900/20'" class="w-8 h-8 rounded flex justify-center items-center">
                                    <i :class="item.tipo === 'entrada' ? 'fa-solid fa-arrow-down' : 'fa-solid fa-arrow-up'"></i>
                                </div>
                                <div>
                                    <p class="font-bold text-gray-200 text-sm" x-text="item.nome"></p>
                                    <p class="text-[10px] text-gray-500" x-text="formatarDataHora(item.data)"></p>
                                </div>
                            </div>
                            <div class="flex items-center gap-3">
                                <p :class="item.tipo === 'entrada' ? 'text-green-400' : 'text-red-400'" class="font-mono font-bold text-sm" x-text="formatarMoeda(item.valor)"></p>
                                <button @click="excluirTransacao(item.id)" class="text-gray-600 hover:text-red-500 transition ml-2">
                                    <i class="fa-solid fa-trash text-xs"></i>
                                </button>
                            </div>
                        </div>
                    </template>
                    <div x-show="transacoesListadas.length === 0" class="text-center py-6 text-gray-500 text-sm italic">
                        Nenhuma transação encontrada.
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- CryptoJS para criptografar os Backups -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <script>
        function app() {
            return {
                isLoggedIn: false,
                usuariosSalvos: [],
                criandoNovo: false,
                novoNome: '',
                novaSenha: '',
                usuarioSelecionado: null,
                senhaTentativa: '',
                erroLogin: '',
                
                perfilAtivo: null,
                transacoes: [],
                senhaAtiva: '',

                dataFiltro: new Date(),
                termoPesquisa: '',

                formLancamento: { tipo: 'saida', nome: '', valor: '' },
                mostrarSugestoes: false, // Controle do balão de popup

                // Sistema de Modal Personalizado
                modal: { show: false, type: 'alert', title: '', body: '', confirmText: 'Ok', inputValue: '', resolve: ()=>{}, reject: ()=>{} },

                iniciar() {
                    const dadosStr = localStorage.getItem('finance_users_db');
                    if(dadosStr) this.usuariosSalvos = JSON.parse(dadosStr);
                },

                // ----- MODAIS ASSÍNCRONOS -----
                showAlert(title, body) {
                    this.modal.title = title; this.modal.body = body; this.modal.type = 'alert'; this.modal.confirmText = 'Ok';
                    this.modal.show = true; this.modal.resolve = () => { this.modal.show = false; };
                },
                showPrompt(title, body, confirmText = 'Confirmar') {
                    return new Promise((resolve) => {
                        this.modal.title = title; this.modal.body = body; this.modal.type = 'prompt'; this.modal.confirmText = confirmText; this.modal.inputValue = '';
                        this.modal.show = true;
                        this.modal.resolve = () => { this.modal.show = false; resolve(this.modal.inputValue); };
                        this.modal.reject = () => { this.modal.show = false; resolve(null); };
                    });
                },
                showConfirm(title, body, confirmText = 'Sim') {
                    return new Promise((resolve) => {
                        this.modal.title = title; this.modal.body = body; this.modal.type = 'confirm'; this.modal.confirmText = confirmText;
                        this.modal.show = true;
                        this.modal.resolve = () => { this.modal.show = false; resolve(true); };
                        this.modal.reject = () => { this.modal.show = false; resolve(false); };
                    });
                },

                // ----- AUTENTICAÇÃO E USUÁRIOS -----
                salvarBancoUsuarios() {
                    localStorage.setItem('finance_users_db', JSON.stringify(this.usuariosSalvos));
                },
                
                selecionarUsuario(user) {
                    this.usuarioSelecionado = user;
                    this.erroLogin = '';
                    this.senhaTentativa = '';
                },

                async excluirUsuario(nome) {
                    const resposta = await this.showPrompt('Excluir Usuário', `Atenção: Todos os dados serão perdidos.<br>Digite <strong>"yes"</strong> para confirmar a exclusão do usuário <strong>${nome}</strong>:`, 'Confirmar Exclusão');
                    if (resposta && resposta.toLowerCase().trim() === 'yes') {
                        this.usuariosSalvos = this.usuariosSalvos.filter(u => u.nome !== nome);
                        localStorage.removeItem(`finance_data_${nome}`);
                        this.salvarBancoUsuarios();
                        this.showAlert('Sucesso', 'Usuário excluído com sucesso.');
                        this.usuarioSelecionado = null;
                        if(this.usuariosSalvos.length === 0) this.criandoNovo = true;
                    } else if(resposta !== null) {
                        this.showAlert('Erro', 'Palavra de segurança incorreta. Ação cancelada.');
                    }
                },

                criarPerfil() {
                    if (this.novoNome.length < 2 || this.novaSenha.length < 4) {
                        this.erroLogin = 'Nome (mín 2) e Senha (mín 4) caracteres.'; return;
                    }
                    if (this.usuariosSalvos.find(u => u.nome.toLowerCase() === this.novoNome.toLowerCase())) {
                        this.erroLogin = 'Este nome de usuário já existe.'; return;
                    }

                    const novoUser = { nome: this.novoNome };
                    this.usuariosSalvos.push(novoUser);
                    this.salvarBancoUsuarios();
                    
                    const encryptedData = CryptoJS.AES.encrypt(JSON.stringify([]), this.novaSenha).toString();
                    localStorage.setItem(`finance_data_${this.novoNome}`, encryptedData);

                    this.novoNome = ''; this.novaSenha = ''; this.criandoNovo = false;
                    this.showAlert('Sucesso', 'Login criado! Agora você pode acessá-lo na lista.');
                    this.selecionarUsuario(novoUser);
                },

                fazerLogin() {
                    try {
                        const dadosCrus = localStorage.getItem(`finance_data_${this.usuarioSelecionado.nome}`);
                        if(!dadosCrus) throw new Error("Sem dados");

                        const bytes = CryptoJS.AES.decrypt(dadosCrus, this.senhaTentativa);
                        const dadosDescriptografados = JSON.parse(bytes.toString(CryptoJS.enc.Utf8));

                        this.iniciarSessao(this.senhaTentativa, dadosDescriptografados);
                    } catch (e) {
                        this.erroLogin = 'Senha incorreta ou erro nos dados.';
                    }
                },

                iniciarSessao(senha, dados) {
                    this.senhaAtiva = senha;
                    this.perfilAtivo = this.usuarioSelecionado;
                    this.transacoes = dados;
                    this.isLoggedIn = true;
                    this.erroLogin = '';
                    this.dataFiltro = new Date();
                },

                logout() {
                    this.isLoggedIn = false;
                    this.perfilAtivo = null;
                    this.senhaAtiva = '';
                    this.transacoes = [];
                    this.usuarioSelecionado = null;
                },

                // ----- LÓGICA FINANCEIRA & LANÇAMENTOS -----
                salvarTransacoesLocal() {
                    const str = JSON.stringify(this.transacoes);
                    const enc = CryptoJS.AES.encrypt(str, this.senhaAtiva).toString();
                    localStorage.setItem(`finance_data_${this.perfilAtivo.nome}`, enc);
                },

                get saldoTotal() {
                    return this.transacoes.reduce((acc, t) => t.tipo === 'entrada' ? acc + t.valor : acc - t.valor, 0);
                },

                async editarSaldo() {
                    const novoSaldoStr = await this.showPrompt('Ajustar Saldo', 'Digite o saldo que você tem hoje (ex: 1500.50):');
                    if (novoSaldoStr === null || novoSaldoStr.trim() === '') return;
                    
                    const novoSaldo = parseFloat(novoSaldoStr.replace(',','.'));
                    if (isNaN(novoSaldo)) return this.showAlert('Erro', 'Valor numérico inválido.');

                    const diferenca = novoSaldo - this.saldoTotal;
                    if(diferenca === 0) return;

                    this.transacoes.unshift({
                        id: Date.now(),
                        tipo: diferenca > 0 ? 'entrada' : 'saida',
                        nome: 'Ajuste de Saldo Manual',
                        valor: Math.abs(diferenca),
                        data: new Date().toISOString()
                    });
                    this.salvarTransacoesLocal();
                },

                // LÓGICA DO AUTOCOMPLETAR (NOVO)
                get sugestoesNomes() {
                    if (!this.formLancamento.nome || this.formLancamento.nome.trim() === '') return [];
                    const busca = this.formLancamento.nome.toLowerCase().trim();
                    
                    // Pega todos os nomes únicos do histórico de transações
                    const nomesUnicos = [...new Set(this.transacoes.map(t => t.nome))];
                    
                    // Filtra ignorando maiúsculas e minúsculas e retorna no máximo 5 sugestões
                    return nomesUnicos.filter(n => n.toLowerCase().includes(busca)).slice(0, 5);
                },

                selecionarSugestao(nome) {
                    this.formLancamento.nome = nome;
                    this.mostrarSugestoes = false; // Fecha o popup
                    this.sugerirValor(); // Preenche o valor automaticamente com o valor do histórico
                },

                sugerirValor() {
                    if(!this.formLancamento.nome || this.formLancamento.nome.length < 2) return;
                    const pesquisa = this.formLancamento.nome.toLowerCase().trim();
                    
                    // Acha a última vez que esse nome exato foi lançado
                    const anterior = this.transacoes.find(t => t.nome.toLowerCase().trim() === pesquisa);
                    
                    if(anterior) {
                        this.formLancamento.valor = anterior.valor;
                        this.formLancamento.tipo = anterior.tipo;
                    }
                },
                
                // ----- FEEDBACK SONORO (WEB AUDIO API) -----
                tocarSom(tipo) {
                    // Inicializa o contexto de áudio do navegador
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (!AudioContext) return; // Segurança caso o navegador seja muito antigo
                    
                    const ctx = new AudioContext();
                    const osc = ctx.createOscillator();
                    const gainNode = ctx.createGain();
                    
                    osc.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    
                    if (tipo === 'entrada') {
                        // Som de "Lucro/Moeda" (Agudo e agradável)
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(800, ctx.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
                        gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                        osc.start(ctx.currentTime);
                        osc.stop(ctx.currentTime + 0.1);
                    } else {
                        // Som de "Gasto/Saída" (Grave e sutil)
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(400, ctx.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.15);
                        gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
                        osc.start(ctx.currentTime);
                        osc.stop(ctx.currentTime + 0.15);
                    }
                },

                salvarLancamento() {
                    if(!this.formLancamento.nome || !this.formLancamento.valor || parseFloat(this.formLancamento.valor) <= 0) return;

                    const dataLancamento = new Date();
                    dataLancamento.setMonth(this.dataFiltro.getMonth());
                    dataLancamento.setFullYear(this.dataFiltro.getFullYear());

                    this.transacoes.unshift({
                        id: Date.now(),
                        tipo: this.formLancamento.tipo,
                        nome: this.formLancamento.nome,
                        valor: parseFloat(this.formLancamento.valor),
                        data: dataLancamento.toISOString()
                    });

                    this.salvarTransacoesLocal();
                    
                    // Dispara o efeito sonoro de acordo com o tipo (entrada ou saida)
                    this.tocarSom(this.formLancamento.tipo);

                    this.formLancamento.nome = ''; this.formLancamento.valor = '';
                    this.mostrarSugestoes = false;
                },

                async excluirTransacao(id) {
                    if(await this.showConfirm('Excluir?', 'Tem certeza que quer apagar este registro?')) {
                        this.transacoes = this.transacoes.filter(t => t.id !== id);
                        this.salvarTransacoesLocal();
                    }
                },

                // ----- FILTROS E EXIBIÇÃO -----
                mudarMes(direcao) {
                    this.dataFiltro.setMonth(this.dataFiltro.getMonth() + direcao);
                    this.dataFiltro = new Date(this.dataFiltro);
                },

                get nomeMesAtual() { return this.dataFiltro.toLocaleDateString('pt-BR', { month: 'long' }); },
                get anoAtual() { return this.dataFiltro.getFullYear(); },

                get transacoesListadas() {
                    const mes = this.dataFiltro.getMonth();
                    const ano = this.dataFiltro.getFullYear();
                    
                    let lista = this.transacoes.filter(t => {
                        const d = new Date(t.data);
                        return d.getMonth() === mes && d.getFullYear() === ano;
                    });

                    if(this.termoPesquisa.trim() !== '') {
                        const termo = this.termoPesquisa.toLowerCase();
                        lista = lista.filter(t => t.nome.toLowerCase().includes(termo));
                    }

                    return lista.sort((a,b) => new Date(b.data) - new Date(a.data));
                },

                // SOMATÓRIO EXCLUSIVO DA PESQUISA (NOVO)
                get totaisPesquisa() {
                    let ent = 0, sai = 0;
                    this.transacoesListadas.forEach(t => {
                        if (t.tipo === 'entrada') ent += t.valor;
                        else sai += t.valor;
                    });
                    return { entradas: ent, saidas: sai };
                },

                get totaisMensais() {
                    let ent = 0, sai = 0;
                    // Usa a lista filtrada apenas pelo mês (ignorando a pesquisa aqui)
                    const mes = this.dataFiltro.getMonth();
                    const ano = this.dataFiltro.getFullYear();
                    this.transacoes.forEach(t => {
                        const d = new Date(t.data);
                        if(d.getMonth() === mes && d.getFullYear() === ano) {
                            t.tipo === 'entrada' ? ent += t.valor : sai += t.valor;
                        }
                    });
                    return { entradas: ent, saidas: sai };
                },

                get totaisAnuais() {
                    let ent = 0, sai = 0;
                    const ano = this.dataFiltro.getFullYear();
                    this.transacoes.forEach(t => {
                        if(new Date(t.data).getFullYear() === ano) {
                            t.tipo === 'entrada' ? ent += t.valor : sai += t.valor;
                        }
                    });
                    return { entradas: ent, saidas: sai };
                },

                // ----- BACKUP SEGURO -----
                exportarBackup() {
                    const enc = CryptoJS.AES.encrypt(JSON.stringify(this.transacoes), this.senhaAtiva).toString();
                    const blob = new Blob([enc], { type: "text/plain" });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    
                    const data = new Date().toLocaleDateString('pt-BR').replace(/\//g, '-');
                    link.download = `backup_financeiro_${this.perfilAtivo.nome}_${data}.enc`;
                    
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                },

                importarBackup(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        try {
                            const textoCriptografado = e.target.result;
                            const bytes = CryptoJS.AES.decrypt(textoCriptografado, this.senhaAtiva);
                            const dados = JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
                            
                            if (dados && Array.isArray(dados)) {
                                if(await this.showConfirm('Restaurar Backup?', 'Isso substituirá TODOS os dados atuais pelos do arquivo. Deseja continuar?')) {
                                    this.transacoes = dados;
                                    this.salvarTransacoesLocal();
                                    this.showAlert('Sucesso', 'Backup restaurado com sucesso!');
                                }
                            }
                        } catch (err) {
                            this.showAlert('Erro', 'O arquivo de backup é inválido ou foi criptografado com outra senha.');
                        }
                        event.target.value = null; 
                    };
                    reader.readAsText(file);
                },

                // Helpers
                formatarMoeda(v) { return (v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); },
                formatarDataHora(d) { return new Date(d).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute:'2-digit' }); }
            }
        }
    </script>

                    .then(reg => console.log('Service Worker registrado com sucesso!', reg))
                    .catch(err => console.error('Erro ao registrar Service Worker', err));
